<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>NBA 球星投票系统</title>
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
      font-family: "Microsoft YaHei", "PingFang SC", sans-serif;
    }

    body {
      background-color: #f5f7fa;
      padding: 50px 20px;
    }

    .container {
      max-width: 850px;
      margin: 0 auto;
      background: #ffffff;
      border-radius: 16px;
      padding: 45px;
      box-shadow: 0 8px 30px rgba(0, 0, 0, 0.06);
    }

    h1 {
      text-align: center;
      color: #2c3e50;
      margin-bottom: 25px;
      padding-bottom: 20px;
      border-bottom: 3px solid #3498db;
      font-size: 28px;
      font-weight: 700;
    }

    /* 全局提示框（所有页面都能显示） */
    .message-box {
      padding: 14px 20px;
      border-radius: 8px;
      margin: 20px auto;
      max-width: 800px;
      text-align: center;
      font-weight: 600;
      display: none;
      animation: fadeIn 0.3s ease-in-out;
    }

    @keyframes fadeIn {
      from { opacity: 0; transform: translateY(-10px); }
      to { opacity: 1; transform: translateY(0); }
    }

    .message-box.success {
      background: linear-gradient(135deg, #d4edda 0%, #c3e6cb 100%);
      color: #155724;
      border: 1px solid #c3e6cb;
      display: block;
    }

    .message-box.error {
      background: linear-gradient(135deg, #f8d7da 0%, #f5c6cb 100%);
      color: #721c24;
      border: 1px solid #f5c6cb;
      display: block;
    }

    /* 登录/注册页面样式 */
    .auth-box {
      max-width: 400px;
      margin: 30px auto;
      padding: 40px;
      background: #fafbfc;
      border-radius: 12px;
      border: 2px solid #ebeef5;
    }

    .auth-tabs {
      display: flex;
      margin-bottom: 30px;
      border-bottom: 2px solid #dcdfe6;
    }

    .auth-tab {
      flex: 1;
      text-align: center;
      padding: 12px 0;
      font-size: 17px;
      font-weight: 600;
      color: #7f8c8d;
      cursor: pointer;
      transition: all 0.3s;
    }

    .auth-tab.active {
      color: #3498db;
      border-bottom: 3px solid #3498db;
      margin-bottom: -2px;
    }

    .auth-form {
      display: none;
    }

    .auth-form.active {
      display: block;
    }

    .form-group {
      margin-bottom: 25px;
    }

    .form-group label {
      display: block;
      color: #34495e;
      font-weight: 600;
      margin-bottom: 10px;
      font-size: 16px;
    }

    .form-group input {
      width: 100%;
      padding: 14px 18px;
      border: 2px solid #dcdfe6;
      border-radius: 8px;
      font-size: 16px;
      outline: none;
      transition: all 0.3s;
    }

    .form-group input:focus {
      border-color: #3498db;
      box-shadow: 0 0 0 4px rgba(52, 152, 219, 0.1);
    }

    .submit-btn {
      width: 100%;
      padding: 14px 0;
      background: linear-gradient(135deg, #3498db 0%, #2980b9 100%);
      color: white;
      border: none;
      border-radius: 8px;
      font-size: 17px;
      font-weight: 600;
      cursor: pointer;
      transition: all 0.3s;
    }

    .submit-btn:hover {
      background: linear-gradient(135deg, #2980b9 0%, #1f6dad 100%);
      transform: scale(1.02);
    }

    /* 投票系统页面样式 */
    .vote-system {
      display: none;
    }

    .vote-system.active {
      display: block;
    }

    .user-info {
      display: flex;
      justify-content: space-between;
      align-items: center;
      margin-bottom: 25px;
      padding: 15px 20px;
      background: #d4edda;
      border-radius: 8px;
      border-left: 5px solid #28a745;
    }

    .user-info span {
      font-weight: 600;
      color: #155724;
      font-size: 16px;
    }

    .logout-btn {
      padding: 8px 20px;
      background: #e74c3c;
      color: white;
      border: none;
      border-radius: 6px;
      font-size: 15px;
      font-weight: 600;
      cursor: pointer;
      transition: all 0.3s;
    }

    .logout-btn:hover {
      background: #c0392b;
    }

    h2 {
      text-align: center;
      color: #2c3e50;
      margin: 45px 0 25px;
      font-size: 22px;
      font-weight: 700;
    }

    .candidates-list {
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(230px, 1fr));
      gap: 22px;
      margin-bottom: 30px;
    }

    .candidate-card {
      border: 2px solid #ebeef5;
      border-radius: 12px;
      padding: 25px 20px;
      text-align: center;
      transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1);
      background: linear-gradient(145deg, #fafbfc 0%, #ffffff 100%);
    }

    .candidate-card:hover {
      transform: translateY(-8px);
      box-shadow: 0 12px 28px rgba(0, 0, 0, 0.12);
      border-color: #3498db;
    }

    .candidate-img {
      width: 110px;
      height: 110px;
      border-radius: 50%;
      object-fit: cover;
      margin-bottom: 15px;
      border: 4px solid #3498db;
      box-shadow: 0 4px 12px rgba(52, 152, 219, 0.2);
    }

    .candidate-name {
      font-size: 19px;
      font-weight: 700;
      color: #2c3e50;
      margin-bottom: 10px;
    }

    .candidate-votes {
      color: #7f8c8d;
      font-size: 15px;
      margin-bottom: 18px;
      font-weight: 500;
    }

    .vote-btn {
      width: 100%;
      padding: 12px 0;
      background: linear-gradient(135deg, #3498db 0%, #2980b9 100%);
      color: white;
      border: none;
      border-radius: 8px;
      font-size: 16px;
      font-weight: 600;
      cursor: pointer;
      transition: all 0.3s;
    }

    .vote-btn:disabled {
      background: linear-gradient(135deg, #95a5a6 0%, #7f8c8d 100%);
      cursor: not-allowed;
    }

    .vote-btn:hover:not(:disabled) {
      background: linear-gradient(135deg, #2980b9 0%, #1f6dad 100%);
      transform: scale(1.02);
    }

    .empty-tip {
      text-align: center;
      color: #999;
      grid-column: 1 / -1;
      padding: 50px 0;
      font-size: 17px;
      font-weight: 500;
    }
  </style>
</head>
<body>
  <!-- 全局提示框（所有页面都能用） -->
  <div class="message-box" id="messageBox"></div>

  <div class="container">
    <h1>🏀 NBA 球星投票系统</h1>

    <!-- 登录/注册页面 -->
    <div class="auth-box" id="authBox">
      <div class="auth-tabs">
        <div class="auth-tab active" onclick="switchTab('login')">登录</div>
        <div class="auth-tab" onclick="switchTab('register')">注册</div>
      </div>

      <!-- 登录表单 -->
      <div class="auth-form active" id="loginForm">
        <div class="form-group">
          <label for="loginUsername">用户名</label>
          <input type="text" id="loginUsername" placeholder="请输入用户名" />
        </div>
        <div class="form-group">
          <label for="loginPassword">密码</label>
          <input type="password" id="loginPassword" placeholder="请输入密码" />
        </div>
        <button class="submit-btn" onclick="handleLogin()">登录</button>
      </div>

      <!-- 注册表单 -->
      <div class="auth-form" id="registerForm">
        <div class="form-group">
          <label for="registerUsername">用户名</label>
          <input type="text" id="registerUsername" placeholder="请设置用户名" />
        </div>
        <div class="form-group">
          <label for="registerPassword">密码</label>
          <input type="password" id="registerPassword" placeholder="请设置密码" />
        </div>
        <div class="form-group">
          <label for="confirmPassword">确认密码</label>
          <input type="password" id="confirmPassword" placeholder="请再次输入密码" />
        </div>
        <button class="submit-btn" onclick="handleRegister()">注册</button>
      </div>
    </div>

    <!-- 投票系统页面 -->
    <div class="vote-system" id="voteSystem">
      <div class="user-info">
        <span>欢迎你，<span id="currentUser"></span>！</span>
        <button class="logout-btn" onclick="handleLogout()">退出登录</button>
      </div>

      <h2>实时投票列表</h2>
      <div class="candidates-list" id="candidatesList">
        <div class="empty-tip">正在加载球星数据...</div>
      </div>
    </div>
  </div>

  <script>
    // 你的后端API地址，确保和你的FC地址一致
    const API_BASE_URL = 'https://vote-server-afiwruibza.cn-hangzhou.fcapp.run';
    let currentUsername = '';
    let hasVoted = false;

    // ====================== 页面初始化 ======================
    window.onload = () => {
      // 检查是否已登录
      const savedUser = localStorage.getItem('voteUsername');
      if (savedUser) {
        currentUsername = savedUser;
        showVoteSystem();
        loadCandidates();
      }
    };

    // ====================== 切换登录/注册标签 ======================
    function switchTab(tab) {
      const tabs = document.querySelectorAll('.auth-tab');
      const forms = document.querySelectorAll('.auth-form');
      
      tabs.forEach(t => t.classList.remove('active'));
      forms.forEach(f => f.classList.remove('active'));

      if (tab === 'login') {
        tabs[0].classList.add('active');
        document.getElementById('loginForm').classList.add('active');
      } else {
        tabs[1].classList.add('active');
        document.getElementById('registerForm').classList.add('active');
      }
      // 切换标签时清空提示
      clearMessage();
    }

    // ====================== 注册功能（注册成功自动登录）======================
    async function handleRegister() {
      const username = document.getElementById('registerUsername').value.trim();
      const password = document.getElementById('registerPassword').value;
      const confirmPwd = document.getElementById('confirmPassword').value;

      // 前端校验
      if (!username || !password) {
        showMessage('用户名和密码不能为空！', 'error');
        return;
      }
      if (password !== confirmPwd) {
        showMessage('两次输入的密码不一致！', 'error');
        return;
      }

      try {
        // 发送注册请求
        const res = await fetch(`${API_BASE_URL}/?action=register&username=${encodeURIComponent(username)}&password=${encodeURIComponent(password)}`);
        const result = await res.json();
        
        if (result.code === 200) {
          showMessage(result.message, 'success');
          // 注册成功，自动登录
          currentUsername = username;
          localStorage.setItem('voteUsername', username);
          // 清空表单
          document.getElementById('registerUsername').value = '';
          document.getElementById('registerPassword').value = '';
          document.getElementById('confirmPassword').value = '';
          // 进入投票系统
          setTimeout(() => {
            showVoteSystem();
            loadCandidates();
          }, 1000);
        } else {
          showMessage(result.message, 'error');
        }
      } catch (e) {
        showMessage('注册失败，请检查网络后重试', 'error');
        console.error('注册报错：', e);
      }
    }

    // ====================== 登录功能 ======================
    async function handleLogin() {
      const username = document.getElementById('loginUsername').value.trim();
      const password = document.getElementById('loginPassword').value;

      if (!username || !password) {
        showMessage('用户名和密码不能为空！', 'error');
        return;
      }

      try {
        const res = await fetch(`${API_BASE_URL}/?action=login&username=${encodeURIComponent(username)}&password=${encodeURIComponent(password)}`);
        const result = await res.json();
        
        if (result.code === 200) {
          currentUsername = username;
          localStorage.setItem('voteUsername', username);
          showMessage(result.message, 'success');
          // 清空表单
          document.getElementById('loginUsername').value = '';
          document.getElementById('loginPassword').value = '';
          // 进入投票系统
          setTimeout(() => {
            showVoteSystem();
            loadCandidates();
          }, 1000);
        } else {
          showMessage(result.message, 'error');
        }
      } catch (e) {
        showMessage('登录失败，请检查网络后重试', 'error');
        console.error('登录报错：', e);
      }
    }

    // ====================== 退出登录 ======================
    function handleLogout() {
      currentUsername = '';
      hasVoted = false;
      localStorage.removeItem('voteUsername');
      document.getElementById('authBox').style.display = 'block';
      document.getElementById('voteSystem').classList.remove('active');
      showMessage('已退出登录', 'success');
    }

    // ====================== 显示投票系统 ======================
    function showVoteSystem() {
      document.getElementById('authBox').style.display = 'none';
      document.getElementById('voteSystem').classList.add('active');
      document.getElementById('currentUser').textContent = currentUsername;
      clearMessage();
    }

    // ====================== 加载球星列表 ======================
    async function loadCandidates() {
      try {
        const res = await fetch(`${API_BASE_URL}/?action=candidates`);
        const result = await res.json();
        if (result.code === 200) {
          renderCandidates(result.data);
        } else {
          showMessage('加载球星列表失败：' + result.message, 'error');
        }
      } catch (e) {
        showMessage('加载球星列表失败，请检查网络', 'error');
        console.error('加载球星报错：', e);
      }
    }

    // ====================== 渲染球星卡片 ======================
    function renderCandidates(candidates) {
      const list = document.getElementById('candidatesList');
      list.innerHTML = '';
      candidates.forEach(candidate => {
        const card = document.createElement('div');
        card.className = 'candidate-card';
        card.innerHTML = `
          <img src="${candidate.img_url}" alt="${candidate.name}" class="candidate-img" />
          <div class="candidate-name">${candidate.name}</div>
          <div class="candidate-votes">当前票数：${candidate.votes}</div>
          <button class="vote-btn" onclick="submitVote(${candidate.id})" ${hasVoted ? 'disabled' : ''}>
            ${hasVoted ? '已投票' : '投TA一票'}
          </button>
        `;
        list.appendChild(card);
      });
    }

    // ====================== 提交投票 ======================
    async function submitVote(candidateId) {
      try {
        const res = await fetch(`${API_BASE_URL}/?action=vote&username=${encodeURIComponent(currentUsername)}&candidateId=${candidateId}`);
        const result = await res.json();
        
        if (result.code === 200) {
          hasVoted = true;
          showMessage('投票成功！', 'success');
          await loadCandidates();
        } else if (result.code === 401) {
          showMessage('登录已过期，请重新登录', 'error');
          handleLogout();
        } else {
          showMessage(result.message, 'error');
        }
      } catch (e) {
        showMessage('投票失败，请重试', 'error');
        console.error('投票报错：', e);
      }
    }

    // ====================== 提示消息工具 ======================
    function showMessage(text, type) {
      const box = document.getElementById('messageBox');
      box.textContent = text;
      box.className = `message-box ${type}`;
      // 3.5秒后自动消失
      setTimeout(() => {
        box.style.display = 'none';
      }, 3500);
    }

    function clearMessage() {
      const box = document.getElementById('messageBox');
      box.style.display = 'none';
    }
  </script>
</body>
</html>
